        :root {
            /* 🎨 Dark Liquid Glass & Crimson Palette */
            --color-background-primary: rgba(20, 20, 25, 0.6);
            --color-background-secondary: rgba(30, 30, 40, 0.75);
            --color-text-primary: #f8fafc;
            --color-text-secondary: #cbd5e1;
            --color-text-tertiary: #94a3b8;
            --color-border-primary: rgba(255, 255, 255, 0.15);
            --color-border-secondary: rgba(255, 255, 255, 0.1);
            --color-border-tertiary: rgba(255, 255, 255, 0.05);
            
            /* 📐 Scaled Up Dimensions (ขยาย UI ให้ใหญ่ขึ้นตามคำขอ) */
            --border-radius-xl: 24px;
            --border-radius-lg: 16px;
            --border-radius-md: 12px;
            
            /* ✨ Glass Blur & Shadow */
            --glass-blur: 20px;
            --glass-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
            --glass-border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* 🔴 เปลี่ยนพื้นหลังตรงส่วนเส้นสีแดงเป็น สีแดงโทนเข้มไล่เฉดไปดำ (Crimson Dark Gradient) */
        body {
            background: radial-gradient(circle at 50% 50%, #2d060e 0%, #150206 50%, #0a0103 100%);
            background-attachment: fixed;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            padding: 20px;
            color: var(--color-text-primary);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        /* 📦 ขยายขนาดกล่องครอบเว็บหลัก (Max-Width ใหญ่ขึ้น รองรับ UI ขยายขนาด) */
        .wrap { 
            padding: 2.5rem; 
            background: rgba(15, 15, 20, 0.45);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-radius: var(--border-radius-xl);
            border: var(--glass-border);
            box-shadow: var(--glass-shadow);
            max-width: 1400px;
            margin: 2rem auto;
        }

        /* 🏷️ ขยายขนาดตัวอักษรส่วนหัว */
        .header h2 { 
            font-size: 26px; 
            font-weight: 600; 
            color: var(--color-text-primary); 
            letter-spacing: -0.01em;
        }

        .header p { 
            font-size: 15px; 
            color: var(--color-text-secondary); 
            margin-top: 8px; 
            margin-bottom: 1.5rem; 
        }

        .legend { 
            display: flex; 
            gap: 20px; 
            margin-bottom: 1.75rem; 
            flex-wrap: wrap; 
        }

        .legend-item { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 14px; 
            color: var(--color-text-secondary); 
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .legend-dot { 
            width: 12px; 
            height: 12px; 
            border-radius: 50%; 
            flex-shrink: 0; 
        }

        /* 📊 ขยายขนาดตารางและเพิ่มช่องไฟให้มีมิติกระจก */
        table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 12px; 
            margin: -12px;
        }

        th { 
            font-size: 14px; 
            font-weight: 600; 
            color: var(--color-text-secondary); 
            padding: 16px 12px; 
            text-align: center; 
            border: 1px solid var(--color-border-secondary); 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: var(--border-radius-md);
        }

        th.day-header { 
            width: 120px; 
        }

        /* ⏳ เพิ่มความสูงของช่องตารางเรียนจาก 96px เป็น 115px (ขยายตามคำขอ) */
        td { 
            padding: 0; 
            height: 115px; 
            border: none;
        }

        td.day-col { 
            font-size: 16px; 
            font-weight: 600; 
            color: var(--color-text-primary); 
            text-align: center; 
            vertical-align: middle; 
            background: rgba(255, 255, 255, 0.05); 
            width: 120px; 
            border-radius: var(--border-radius-md);
            border: 1px solid var(--color-border-secondary);
        }

            flex-direction: column; 
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
